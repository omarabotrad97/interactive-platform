name: Build and Deploy Client to GitHub Pages

on:
  push:
    branches:
      - main # Runs whenever code is pushed to the main branch

permissions:
  contents: write # Required to allow writing build outputs to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: client

      - name: Build Project
        run: npm run build
        working-directory: client

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: client/dist
          branch: gh-pages # Target branch for static files hosting
